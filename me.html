<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Drafts — StoryQuest</title>
  <link rel="stylesheet" href="assets/styles.css?v=13" />
</head>
<body>

<nav class="nav">
  <div class="nav__inner">
    <a class="nav__logo" href="index.html">Story<span>Quest</span></a>
    <div class="nav__links">
      <a class="nav__link" href="index.html">Home</a>
      <a class="nav__link" href="explore.html">Explore</a>
      <a class="nav__link" href="me.html">My Drafts</a>
    </div>
    <a class="nav__cta" href="editor.html">+ Write Story</a>
  </div>
</nav>

<div class="page--narrow">
  <div class="page-header" style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px">
    <div>
      <h1>My Drafts</h1>
      <p>Saved locally in this browser</p>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn--secondary btn--sm" id="import-btn">📁 Import JSON</button>
      <a class="btn btn--primary btn--sm" href="editor.html">＋ New Story</a>
    </div>
  </div>

  <!-- Import zone -->
  <div class="import-zone" id="import-zone">
    <div style="font-size:2rem;margin-bottom:8px">📂</div>
    <strong>Drop a story JSON here</strong>
    <p style="font-size:0.83rem;margin-top:4px">or click "Import JSON" above</p>
  </div>
  <input type="file" id="import-file-input" accept=".json,application/json" style="display:none" />

  <hr class="divider" />

  <!-- Drafts list -->
  <div id="drafts-list"></div>
</div>

<script src="assets/config.js?v=13"></script>
<script src="assets/app.js?v=13"></script>
<script src="assets/storage.js?v=13"></script>
<script src="assets/github.js?v=13"></script>
<script>
(function () {
  setActiveNav();

  const draftsList   = document.getElementById("drafts-list");
  const importZone   = document.getElementById("import-zone");
  const importBtn    = document.getElementById("import-btn");
  const importInput  = document.getElementById("import-file-input");

  function renderDrafts() {
    const drafts = listDrafts();
    if (!drafts.length) {
      draftsList.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">📝</div>
          <div class="empty-state__title">No drafts yet</div>
          <p style="margin-bottom:20px">Start writing your first story.</p>
          <a class="btn btn--primary" href="editor.html">✍️ Create Story</a>
        </div>`;
      return;
    }

    draftsList.innerHTML = drafts.map(story => {
      const theme = themeById(story.theme);
      const cover = coverCss(story.coverStyle);
      const chapters = (story.chapters || []).length;
      return `
        <div class="draft-item" data-id="${escHtml(story.id)}">
          <div class="draft-cover-thumb" style="background:${cover}"></div>
          <div class="draft-info">
            <div class="draft-title">${escHtml(story.title || "Untitled Story")}</div>
            <div class="draft-meta">
              ${escHtml(theme.emoji)} ${escHtml(theme.label)} &middot;
              ${chapters} chapter${chapters !== 1 ? "s" : ""} &middot;
              Updated ${timeAgo(story.updatedAt)}
            </div>
          </div>
          <div class="draft-actions">
            <a class="btn btn--secondary btn--sm" href="editor.html?draft=${escHtml(story.id)}">
              ✏️ <span>Edit</span>
            </a>
            <button class="btn btn--secondary btn--sm" onclick="previewDraft('${escHtml(story.id)}')">
              👁 <span>Preview</span>
            </button>
            <button class="btn btn--secondary btn--sm" onclick="exportDraft('${escHtml(story.id)}')">
              ⬇ <span>Export</span>
            </button>
            <button class="btn btn--danger btn--sm" onclick="removeDraft('${escHtml(story.id)}')">
              🗑
            </button>
          </div>
        </div>`;
    }).join("");
  }

  window.previewDraft = (id) => {
    window.open(`s.html?draft=${id}`, "_blank");
  };

  window.exportDraft = (id) => {
    const story = getDraft(id);
    if (story) exportDraftJSON(story);
  };

  window.removeDraft = (id) => {
    if (!confirm("Delete this draft? This cannot be undone.")) return;
    deleteDraft(id);
    showToast("Draft deleted");
    renderDrafts();
  };

  // ── Import ────────────────────────────────────────────────
  function handleImport(file) {
    if (!file || !file.name.endsWith(".json")) {
      showToast("Please select a .json file", "error");
      return;
    }
    importDraftJSON(file, (err, story) => {
      if (err) { showToast("Import failed: " + err.message, "error"); return; }
      showToast(`"${story.title || "Story"}" imported!`, "success");
      renderDrafts();
    });
  }

  importBtn.addEventListener("click", () => importInput.click());
  importInput.addEventListener("change", e => {
    if (e.target.files[0]) handleImport(e.target.files[0]);
    importInput.value = "";
  });

  // Drag-and-drop
  importZone.addEventListener("dragover", e => { e.preventDefault(); importZone.classList.add("import-zone--drag"); });
  importZone.addEventListener("dragleave", () => importZone.classList.remove("import-zone--drag"));
  importZone.addEventListener("drop", e => {
    e.preventDefault();
    importZone.classList.remove("import-zone--drag");
    const file = e.dataTransfer.files[0];
    if (file) handleImport(file);
  });
  importZone.addEventListener("click", () => importInput.click());

  renderDrafts();
})();
</script>
</body>
</html>
